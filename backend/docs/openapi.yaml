openapi: 3.1.0
info:
  title: Coach Vie Backend API
  version: 0.1.0-poc
  description: POC API contract for Coach Vie (auth, diagnostic, plan, content, admin).
servers:
  - url: http://localhost:4000
paths:
  /health:
    get:
      summary: Health check
      responses:
        '200':
          description: Service is healthy
  /api/auth/signup:
    post:
      summary: Register a new member account
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SignupRequest'
      responses:
        '201':
          description: User created
  /api/auth/login:
    post:
      summary: Login with email and password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Authenticated
  /api/auth/logout:
    post:
      summary: Logout current user session
      responses:
        '200':
          description: Logged out
  /api/auth/me:
    get:
      summary: Get current authenticated user
      security:
        - cookieAuth: []
      responses:
        '200':
          description: Current user profile
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/diagnostic/start:
    post:
      summary: Start a diagnostic session
      security:
        - cookieAuth: []
      responses:
        '201':
          description: Session created
        '401':
          $ref: '#/components/responses/Unauthorized'
  /api/diagnostic/step/{stepNumber}:
    post:
      summary: Save responses for one diagnostic step
      security:
        - cookieAuth: []
      parameters:
        - name: stepNumber
          in: path
          required: true
          schema:
            type: integer
            minimum: 1
            maximum: 3
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DiagnosticStepRequest'
      responses:
        '200':
          description: Step saved
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /api/diagnostic/submit:
    post:
      summary: Submit diagnostic and generate a plan
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DiagnosticSubmitRequest'
      responses:
        '201':
          description: Diagnostic submitted and plan generated
  /api/diagnostic/history:
    get:
      summary: List submitted diagnostics for current user
      security:
        - cookieAuth: []
      responses:
        '200':
          description: Diagnostic history

  /api/plan/current:
    get:
      summary: Get current plan and all plan items
      security:
        - cookieAuth: []
      responses:
        '200':
          description: Current plan data
  /api/plan/{date}/items:
    get:
      summary: Get plan items for one day
      security:
        - cookieAuth: []
      parameters:
        - name: date
          in: path
          required: true
          schema:
            type: string
            pattern: '^\\d{4}-\\d{2}-\\d{2}$'
      responses:
        '200':
          description: Plan items for requested date
  /api/plan/item/{id}/status:
    patch:
      summary: Update plan item status
      security:
        - cookieAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            minimum: 1
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PlanStatusUpdateRequest'
      responses:
        '200':
          description: Status updated

  /api/content/pillar/{pillar}:
    get:
      summary: Get active content by pillar
      security:
        - cookieAuth: []
      parameters:
        - name: pillar
          in: path
          required: true
          schema:
            type: string
            enum: [nutrition, sport, mind]
      responses:
        '200':
          description: Content list
  /api/content/{id}:
    get:
      summary: Get one content module
      security:
        - cookieAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            minimum: 1
      responses:
        '200':
          description: Content detail
        '404':
          $ref: '#/components/responses/NotFound'

  /api/admin/content:
    post:
      summary: Create content module (admin only)
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AdminCreateContentRequest'
      responses:
        '201':
          description: Content created
        '403':
          $ref: '#/components/responses/Forbidden'
  /api/admin/content/{id}/activation:
    patch:
      summary: Activate or deactivate content module (admin only)
      security:
        - cookieAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            minimum: 1
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AdminContentActivationRequest'
      responses:
        '200':
          description: Content activation updated
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
  /api/admin/mapping-rules:
    get:
      summary: List mapping rules (admin only)
      security:
        - cookieAuth: []
      responses:
        '200':
          description: Mapping rule list
        '403':
          $ref: '#/components/responses/Forbidden'
  /api/admin/mapping-rules/{id}:
    patch:
      summary: Update one mapping rule (admin only)
      security:
        - cookieAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            minimum: 1
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AdminUpdateMappingRuleRequest'
      responses:
        '200':
          description: Mapping rule updated
        '400':
          $ref: '#/components/responses/ValidationError'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
  /api/admin/audit-logs:
    get:
      summary: List latest admin audit logs (admin only)
      security:
        - cookieAuth: []
      parameters:
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
      responses:
        '200':
          description: Admin audit logs
        '403':
          $ref: '#/components/responses/Forbidden'

components:
  securitySchemes:
    cookieAuth:
      type: apiKey
      in: cookie
      name: coachvie_token

  responses:
    ValidationError:
      description: Validation error
    Unauthorized:
      description: Missing or invalid authentication
    Forbidden:
      description: Insufficient permissions
    NotFound:
      description: Resource not found

  schemas:
    SignupRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 8
    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 8
    DiagnosticAnswer:
      type: object
      required: [questionCode, value]
      properties:
        questionCode:
          type: string
        value:
          type: integer
          minimum: 1
          maximum: 5
    DiagnosticStepRequest:
      type: object
      required: [sessionId, answers]
      properties:
        sessionId:
          type: integer
          minimum: 1
        answers:
          type: array
          minItems: 1
          items:
            $ref: '#/components/schemas/DiagnosticAnswer'
    DiagnosticSubmitRequest:
      type: object
      required: [sessionId]
      properties:
        sessionId:
          type: integer
          minimum: 1
    PlanStatusUpdateRequest:
      type: object
      required: [status]
      properties:
        status:
          type: string
          enum: [todo, done]
    AdminCreateContentRequest:
      type: object
      required: [pillar, title, description, durationMinutes, externalLink]
      properties:
        pillar:
          type: string
          enum: [nutrition, sport, mind]
        title:
          type: string
          minLength: 3
          maxLength: 120
        description:
          type: string
          minLength: 10
          maxLength: 2000
        durationMinutes:
          type: integer
          minimum: 1
          maximum: 240
        externalLink:
          type: [string, 'null']
          format: uri
    AdminContentActivationRequest:
      type: object
      required: [isActive]
      properties:
        isActive:
          type: boolean
    AdminUpdateMappingRuleRequest:
      type: object
      required: [minScore, maxScore, contentId, priority, isActive]
      properties:
        minScore:
          type: integer
          minimum: 0
          maximum: 100
        maxScore:
          type: integer
          minimum: 0
          maximum: 100
        contentId:
          type: integer
          minimum: 1
        priority:
          type: integer
          minimum: 1
          maximum: 100
        isActive:
          type: boolean
